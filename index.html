<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERTEX14 // THE PLATFORM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@200;300;400;600;700&family=Syncopate:wght@400;700&family=Oswald:wght@200;400&display=swap');
        
        /* תיקון לניידים */
        img { max-width: 100%; height: auto; }
        @media (max-width: 768px) {
            header { padding: 10px 2% !important; flex-direction: column; }
            .hero h1 { font-size: 32px !important; }
            .interactive-booking, .cafe-showcase, .gallery-grid { grid-template-columns: 1fr !important; }
        }

        :root { --bg-pure: #000000; --bg-dark: #050507; --bg-card: #0d0d11; --accent-glow: rgba(255, 255, 255, 0.95); --wood-tone: #b89474; --text-light: #f5f5f7; --text-muted: #6e6e73; --transition-smooth: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Assistant', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-light); line-height: 1.6; overflow-x: hidden; }
        /* המשך עיצוב */
        header { background: rgba(5, 5, 7, 0.8); backdrop-filter: blur(30px); position: fixed; top: 0; width: 100%; z-index: 1000; border-bottom: 1px solid rgba(255, 255, 255, 0.03); display: flex; justify-content: space-between; align-items: center; padding: 20px 6%; }
        .nav-links a { color: var(--text-light); text-decoration: none; font-size: 0.9rem; margin-right: 30px; letter-spacing: 1px; }
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero h1 { font-family: 'Syncopate', sans-serif; font-size: 64px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <header>
        <div class="logo">VERTEX14</div>
        <nav class="nav-links">
            <a href="#work">PROJECTS</a>
            <a href="#about">ABOUT</a>
            <a href="#contact">CONTACT</a>
        </nav>
    </header>

    <section class="hero">
        <h1>THE PLATFORM</h1>
        <p>ARCHITECTURAL VISUALIZATION & DESIGN</p>
    </section>
    <section id="work" style="padding: 100px 6%;">
        <h2 style="margin-bottom: 40px; font-size: 2rem;">PROJECTS</h2>
        <div class="gallery-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
            <div class="project-card"></div>
        </div>
    </section>

    <footer style="padding: 40px 6%; text-align: center; border-top: 1px solid rgba(255, 255, 255, 0.03);">
        <p>© 2026 VERTEX14 // THE PLATFORM</p>
    </footer>
</body>
</html>
