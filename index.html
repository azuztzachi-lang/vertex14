<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VERTEX14 // THE PLATFORM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;700&family=Syncopate:wght@400;700&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #050507; color: #f5f5f7; font-family: 'Assistant', sans-serif; overflow-x: hidden; }

        /* Splash Screen Fix */
        #splash-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background-color: #000; z-index: 9999; 
            display: flex; justify-content: center; align-items: center;
            animation: hideSplash 0.5s ease-in 3s forwards;
        }
        @keyframes hideSplash { to { opacity: 0; visibility: hidden; display: none; } }
        #splash-logo { width: 80%; max-width: 300px; }

        /* Layout Fixes */
        header { position: fixed; top: 0; width: 100%; z-index: 1000; padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.8); }
        .hero { height: 100vh; width: 100%; display: flex; align-items: center; padding: 0 5%; }
        
        section { padding: 80px 5%; width: 100%; }
        
        /* Mobile Specific Fix */
        @media (max-width: 768px) {
            header { flex-direction: column; gap: 10px; }
            .hero h1 { font-size: 28px !important; }
            section { padding: 40px 5%; }
        }
    </style>
</head>
<body>
    <div id="splash-screen"><img id="splash-logo" src="logo_transparent.png" alt="Logo"></div>

    <header>
        <div class="logo-container"><img src="logo_transparent.png" style="height:30px;"></div>
        <nav>
            <a href="#booking" style="color:white; text-decoration:none; margin:0 10px;">הזמנות</a>
            <a href="#about" style="color:white; text-decoration:none; margin:0 10px;">אודות</a>
        </nav>
    </header>

    <div class="hero">
        <div class="hero-content">
            <h1>VERTEX14</h1>
            <p>מרחב ארכיטקטוני בנמל תל אביב.</p>
        </div>
    </div>

    <section id="booking">
        <h2>שיריינו נפח עבודה</h2>
    </section>

    <section id="about">
        <h2>אודות</h2>
        <p>Tzachi Azuz // VERTEX14 - מרכז לימודי בביתן 14, נמל תל אביב.</p>
    </section>

    <script>
        // מחיקת מסך הפתיחה מהדום לאחר סיום ההנפשה
        setTimeout(() => {
            document.getElementById('splash-screen').style.display = 'none';
        }, 3500);
    </script>
</body>
</html>
